<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            background-color: red;
            height: 455px;
        }
        .box{
            border: 2px solid black;
            display: inline-block;
            /* transform: translate(134px, 115px);
            transform-origin: 0;  */
            /* transform: scale(2,2); */
            /* transform: scaleX(3);
            transform: scaleY(3); */
           /* transform: scale3d(2,2,2); */
           /* transform: skew(10deg, 10deg); */
           /* transform: rotateZ(2deg); */
        }
        
        img{
            width: 146px;
            height: 455px;
            /* transition-property: width;
            transition-duration: 1s;
            transition-timing-function: ease-in;
            transition-delay: 3s; */
            transition: width 1s ease-in-out, height 4s ease-in;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            <img id="myImage" src="https://images.unsplash.com/photo-1461988320302-91bde64fc8e4?ixid=2yJhcHBfaWQiOjEyMDd9&w=333&dpr=2" alt="">
            <button id="btn">Toggle</button>
        </div>
    </div>
</body>
<script>
    myImage.style.width = '146px';
    myImage.style.height = '16px';

   btn.addEventListener("click", ()=>{
    myImage.style.height = '456px';
    if(myImage.style.width==='546px'){
        myImage.style.width= "146px";
    }
    else if(myImage.style.width==='146px'){
        myImage.style.width= "546px";
    }
   })
        </script>
</html>
