<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css Selectors</title>
    <style>
h1{
    color: blueviolet;
}
div{
    background-color: aquamarine;
}
#red , h3{
    color: blue; background-color: chartreuse;
}
.blue{
    color: crimson; background-color: grey; border: 2px solid black;
}
*{
    background-color: white;
}
    </style>
</head>
<body>
    <div>
        <h1>This is my css Selector page</h1>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Aut, consequatur.</p>
        <h1>This is another h1</h1>
    <div id="red">bg is red</div>
    <span class="blue">first</span>
    <span class="blue">second</span>
    <span class="blue">third</span>
    <h3>I am h3</h3>
</div>
</body>
</html>
